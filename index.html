<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile Card | Professional Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #4f46e5;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --bg-gradient: linear-gradient(135deg, #e0e7ff 0%, #f3f4f6 100%);
            --card-bg: #ffffff;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Profile Card Container */
        .profile-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 380px;
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: transform 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-5px);
        }

        /* Profile Image */
        .image-container {
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
            border-radius: 50%;
            padding: 5px;
            background: linear-gradient(to right, var(--primary-color), #a855f7);
        }

        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #fff;
        }

        /* Typography */
        .student-name {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .student-stream {
            font-size: 0.9rem;
            font-weight: 400;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: block;
        }

        .student-bio {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* Social Buttons */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn {
            text-decoration: none;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            background: #f3f4f6;
            color: var(--text-main);
        }

        /* Button Hover Effects */
        .btn:hover {
            transform: scale(1.1);
            color: #fff;
        }

        .btn-github:hover { background-color: #333; }
        .btn-linkedin:hover { background-color: #0077b5; }
        .btn-email:hover { background-color: #ea4335; }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .profile-card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

    <article class="profile-card">
        <div class="image-container">
            <img src="https://via.placeholder.com/150" alt="Student Profile Picture" class="profile-img">
        </div>

        <header>
            <h1 class="student-name">Alex Rivera</h1>
            <span class="student-stream">Computer Science & AI</span>
        </header>

        <p class="student-bio">
            Passionate junior developer focusing on building accessible, user-centric web applications. Currently exploring the intersection of React and Generative AI.
        </p>

        <div class="social-links">
            <a href="#" class="btn btn-github" title="GitHub" aria-label="GitHub">
                <i class="fab fa-github"></i>
            </a>
            <a href="#" class="btn btn-linkedin" title="LinkedIn" aria-label="LinkedIn">
                <i class="fab fa-linkedin-in"></i>
            </a>
            <a href="mailto:alex@example.com" class="btn btn-email" title="Email" aria-label="Email">
                <i class="fas fa-envelope"></i>
            </a>
        </div>
    </article>

</body>
</html>
